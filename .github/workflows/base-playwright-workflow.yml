name: GHA Tests
on:
  workflow_dispatch:
  workflow_call:
jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Create .env file
        run: |
          echo "USER_EMAIL=${{ secrets.USER_EMAIL }}" >> .env
          echo "USER_PASSWORD=${{ secrets.USER_PASSWORD }}" >> .env
          echo "CREDIT_CARD_NUMBER=${{ secrets.CREDIT_CARD_NUMBER }}" >> .env
          echo "INVALID_CREDIT_CARD_NUMBER=${{ secrets.INVALID_CREDIT_CARD_NUMBER }}" >> .env
          echo "CREDIT_CARD_EXPIRATION_DATE=${{ secrets.CREDIT_CARD_EXPIRATION_DATE }}" >> .env
          echo "CREDIT_CARD_SECURITY_CODE=${{ secrets.CREDIT_CARD_SECURITY_CODE }}" >> .env
          echo "API_USERNAME=${{ secrets.API_USERNAME }}" >> .env
          echo "API_PASSWORD=${{ secrets.API_PASSWORD }}" >> .env
      - uses: actions/setup-node@v5
        with:
            node-version: lts/*
            cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps
      - name: Run tests
        run: npm run test
      - uses: actions/upload-artifact@v6
        if: failure() || cancelled()
        with:
          name: playwright-output
          path: |
            test/reports
            log/test.log
          retention-days: 7